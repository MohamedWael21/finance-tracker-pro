<app-card>
  <app-card-header>
    <app-card-title>{{ title() }}</app-card-title>
  </app-card-header>
  <app-card-content>
    <div class="relative flex flex-col items-center">
      <div class="relative h-[350px] w-full">
        <canvas
          baseChart
          [data]="chartData()"
          [options]="chartOptions"
          [plugins]="chartPlugins"
          [type]="'pie'"
        >
        </canvas>
      </div>
    </div>
  </app-card-content>
</app-card>
