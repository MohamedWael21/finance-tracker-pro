
<button
  (click)="toggle()"
  class="fixed bottom-6 right-6 z-50 w-14 h-14 rounded-full bg-primary text-white shadow-lg flex items-center justify-center hover:scale-105 transition"
>
  @if (!isOpen()) {
    <svg lucideMessageCircle class="w-6 h-6"></svg>
  } @else {
    <svg lucideX class="w-6 h-6"></svg>
  }
</button>

@if (isOpen()) {
  <div
    class="fixed bottom-24 right-6 z-50 w-[380px] h-[550px] bg-card border border-border rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in-95"
  >
    <app-chat-ui class="h-full"></app-chat-ui>
  </div>
}
