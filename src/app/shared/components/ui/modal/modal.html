@if (isOpen()) {
  <div
    class="fixed inset-0 bg-black/60 backdrop-blur-[2px] flex items-center justify-center z-50 p-4"
    (click)="close()"
  >
    <div
      [class]="
        'bg-card text-card-foreground rounded-2xl shadow-2xl w-full border border-border ' +
        sizeClass
      "
      (click)="stopEventPropagation($event)"
    >
      <div class="flex items-center justify-between p-6 border-b border-border/50">
        <h2 class="text-xl font-semibold m-0">{{ title() }}</h2>
        <button
          (click)="close()"
          class="p-2 hover:bg-accent rounded-lg transition-colors text-muted-foreground hover:text-foreground"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </div>

      <div class="p-6">
        <ng-content />
      </div>

      <div class="p-6 pt-0 flex justify-end gap-3 text-right">
        <ng-content select="[footer]" />
      </div>
    </div>
  </div>
}
