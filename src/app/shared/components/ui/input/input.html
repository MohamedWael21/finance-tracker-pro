@if (label()) {
  <label [for]="id()" class="block mb-2">{{ label() }}</label>
}
<input
  [id]="id()"
  [type]="type()"
  [class]="inputStyles"
  [placeholder]="placeholder()"
  [value]="value()"
  [disabled]="disabled()"
  [required]="required()"
  [name]="name()"
  (input)="value.set($any($event.target).value)"
/>
@if (error()) {
  <p class="mt-1 text-sm text-destructive">{{ error() }}</p>
}
