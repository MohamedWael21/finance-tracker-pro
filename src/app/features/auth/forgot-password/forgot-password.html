<div class="forgot-password-container border border-grey-500 border-1 rounded-lg p-6 max-w-md mx-auto mt-10">
  <div class="forgot-password-content">
    <div class="forgot-password-header text-center mb-8">
      <h3 class="text-2xl font-bold text-foreground">Forgot Password</h3>
      <p class="text-muted-foreground mt-2">Enter your email to receive a password reset link.</p>
    </div>

    @if (errorMessage()) {
      <div class="bg-destructive/15 text-destructive text-sm p-3 rounded-lg mb-6">
        {{ errorMessage() }}
      </div>
    }

    @if (successMessage()) {
      <div class="bg-green-500/15 text-green-600 text-sm p-3 rounded-lg mb-6">
        {{ successMessage() }}
      </div>
    }

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="forgot-password-body flex flex-col gap-5">
      <app-input label="Email Address" placeholder="name@example.com" type="email"
        [error]="getErrorMessage('email')" (valueChange)="forgotPasswordForm.get('email')?.setValue($event)"></app-input>

      <app-button type="submit" [fullWidth]="true" class="mt-2" [disabled]="isLoading()">
        {{ isLoading() ? 'Sending...' : 'Send Reset Link' }}
      </app-button>
    </form>

    <div class="forgot-password-footer mt-8 text-center">
      <p class="text-sm text-muted-foreground">
        Remembered your password?
        <a routerLink="/auth/login" class="text-primary hover:underline font-medium">Log in</a>
      </p>
    </div>
  </div>
</div>
