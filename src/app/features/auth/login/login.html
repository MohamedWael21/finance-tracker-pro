<div style="padding: 20px; max-width: 400px; margin: 50px auto; border: 1px solid #ccc; border-radius: 8px;">
  <h2 style="text-align: center;">Test Login</h2>
  <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Email:</label>
      <input type="email" name="email" [(ngModel)]="credentials.email" required style="width: 100%; padding: 8px; box-sizing: border-box;">
    </div>
    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Password:</label>
      <input type="password" name="password" [(ngModel)]="credentials.password" required style="width: 100%; padding: 8px; box-sizing: border-box;">
    </div>
    <button type="submit" [disabled]="!loginForm.valid" style="width: 100%; padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px;">Login</button>
  </form>
</div>
