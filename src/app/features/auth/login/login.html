<div class="login-container border border-grey-500 border-1 rounded-lg p-6 max-w-md mx-auto mt-10">
  <div class="login-content">
    <div class="login-header text-center mb-8">
      <h3 class="text-2xl font-bold text-foreground">Welcome back</h3>
      <p class="text-muted-foreground mt-2">Enter your credentials to access your account</p>
    </div>

    @if (errorMessage()) {
      <div class="bg-destructive/15 text-destructive text-sm p-3 rounded-lg mb-6">
        {{ errorMessage() }}
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-body flex flex-col gap-5">
      <app-input label="Email Address" placeholder="name@example.com" type="email"
        [error]="getErrorMessage('email')" (valueChange)="loginForm.get('email')?.setValue($event)"></app-input>

      <app-input class="block" label="Password" placeholder="••••••••" type="password"
        [error]="getErrorMessage('password')" (valueChange)="loginForm.get('password')?.setValue($event)"></app-input>

      <div class="flex items-center justify-end">
        <a routerLink="/auth/forgot-password" class="text-sm text-primary hover:underline">Forgot password?</a>
      </div>

      <app-button type="submit"  [fullWidth]="true" [disabled]="isLoading()" class="mt-2">
        {{ isLoading() ? 'Logging in...' : 'Login' }}
      </app-button>
    </form>

    <div class="login-footer mt-8 text-center">
      <p class="text-sm text-muted-foreground">
        Don't have an account?
        <a routerLink="/auth/register" class="text-primary hover:underline font-medium">Create an account</a>
      </p>
    </div>
  </div>
</div>
