<div class="reset-password-container border border-grey-500 border-1 rounded-lg p-6 max-w-md mx-auto mt-10">
  <div class="reset-password-content">
    <div class="reset-password-header text-center mb-8">
      <h3 class="text-2xl font-bold text-foreground">Set New Password</h3>
      <p class="text-muted-foreground mt-2">Please enter your new password below.</p>
    </div>

    @if (errorMessage()) {
      <div class="bg-destructive/15 text-destructive text-sm p-3 rounded-lg mb-6">
        {{ errorMessage() }}
      </div>
    }

    @if (successMessage()) {
      <div class="bg-green-500/15 text-green-600 text-sm p-3 rounded-lg mb-6">
        {{ successMessage() }}
      </div>
    }

    <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" class="reset-password-body flex flex-col gap-5">
      <app-input class="block" label="New Password" placeholder="••••••••" type="password"
        [error]="getErrorMessage('password')" (valueChange)="resetPasswordForm.get('password')?.setValue($event)"></app-input>

      <app-input class="block" label="Confirm New Password" placeholder="••••••••" type="password"
        [error]="getErrorMessage('confirmPassword')" (valueChange)="resetPasswordForm.get('confirmPassword')?.setValue($event)"></app-input>

      <app-button type="submit" [fullWidth]="true" class="mt-2" [disabled]="isLoading() || !token">
        {{ isLoading() ? 'Resetting...' : 'Reset Password' }}
      </app-button>
    </form>

    <div class="reset-password-footer mt-8 text-center">
      <p class="text-sm text-muted-foreground">
        Back to
        <a href="/auth/login" class="text-primary hover:underline font-medium">Log in</a>
      </p>
    </div>
  </div>
</div>
